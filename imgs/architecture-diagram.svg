<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <style>
    .box { fill: #ffffff; stroke: #2d6cdf; stroke-width: 3; rx: 14; ry: 14; }
    .label { font-family: Arial, sans-serif; font-size: 20px; fill: #1f2937; }
    .sub { font-family: Arial, sans-serif; font-size: 16px; fill: #4b5563; }
    .arrow { stroke: #2d6cdf; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    .bg { fill: #eef2ff; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2d6cdf" />
    </marker>
  </defs>
  <rect width="900" height="500" rx="24" ry="24" class="bg" />

  <rect x="60" y="70" width="190" height="120" class="box" />
  <text x="160" y="105" text-anchor="middle" class="label">Developer</text>
  <text x="160" y="135" text-anchor="middle" class="sub">git push</text>

  <rect x="310" y="70" width="220" height="120" class="box" />
  <text x="420" y="105" text-anchor="middle" class="label">GitHub</text>
  <text x="420" y="135" text-anchor="middle" class="sub">Repository + Webhook</text>

  <rect x="610" y="70" width="220" height="120" class="box" />
  <text x="720" y="105" text-anchor="middle" class="label">Jenkins</text>
  <text x="720" y="135" text-anchor="middle" class="sub">Pipeline Trigger</text>

  <rect x="310" y="260" width="220" height="120" class="box" />
  <text x="420" y="295" text-anchor="middle" class="label">AWS EC2</text>
  <text x="420" y="325" text-anchor="middle" class="sub">SSH + npm + PM2</text>

  <rect x="610" y="260" width="220" height="120" class="box" />
  <text x="720" y="295" text-anchor="middle" class="label">Node.js App</text>
  <text x="720" y="325" text-anchor="middle" class="sub">Runs on port 3000</text>

  <path d="M250,130 L310,130" class="arrow" />
  <path d="M530,130 L610,130" class="arrow" />
  <path d="M720,190 L720,260" class="arrow" />
  <path d="M420,380 L720,380" class="arrow" />

  <text x="110" y="175" class="sub">Code push</text>
  <text x="470" y="175" class="sub">Webhook trigger</text>
  <text x="760" y="230" class="sub">Deploy</text>
  <text x="565" y="405" class="sub">Application live</text>
</svg>
